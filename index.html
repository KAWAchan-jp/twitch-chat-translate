<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Twitch Chat Translator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="setup-screen" class="setup-screen">
  <div class="setup-card">
    <div class="logo">
      <span class="logo-icon">💬</span>
      <h1>Twitch Chat Translator</h1>
      <p class="subtitle">Twitchチャットをリアルタイム日本語翻訳</p>
    </div>
    <div class="input-group">
      <label for="channel-input">チャンネル名</label>
      <div class="input-row">
        <span class="input-prefix">twitch.tv/</span>
        <input type="text" id="channel-input" placeholder="xqc" autocomplete="off" spellcheck="false">
      </div>
    </div>
    <div class="input-group lang-row">
      <div class="lang-col">
        <label for="lang-select">翻訳元</label>
        <select id="lang-select">
          <option value="auto">自動検出</option>
          <option value="en">英語</option>
          <option value="ko">韓国語</option>
          <option value="zh-CN">中国語簡体字</option>
          <option value="zh-TW">中国語繁体字</option>
          <option value="es">スペイン語</option>
          <option value="fr">フランス語</option>
          <option value="de">ドイツ語</option>
          <option value="pt">ポルトガル語</option>
          <option value="ru">ロシア語</option>
          <option value="ja">日本語</option>
          <option value="ar">アラビア語</option>
          <option value="hi">ヒンディー語</option>
          <option value="th">タイ語</option>
          <option value="vi">ベトナム語</option>
        </select>
      </div>
      <span class="lang-arrow">→</span>
      <div class="lang-col">
        <label for="target-lang-select">翻訳先</label>
        <select id="target-lang-select">
          <option value="ja">日本語</option>
          <option value="en">英語</option>
          <option value="ko">韓国語</option>
          <option value="zh-CN">中国語簡体字</option>
          <option value="zh-TW">中国語繁体字</option>
          <option value="es">スペイン語</option>
          <option value="fr">フランス語</option>
          <option value="de">ドイツ語</option>
          <option value="pt">ポルトガル語</option>
          <option value="ru">ロシア語</option>
          <option value="ar">アラビア語</option>
          <option value="hi">ヒンディー語</option>
          <option value="th">タイ語</option>
          <option value="vi">ベトナム語</option>
        </select>
      </div>
    </div>
    <button id="connect-btn" class="connect-btn">接続する</button>
    <p class="note">※ APIキー不要・サーバー不要で動作します</p>
    <p class="version">v0.6</p>
  </div>
</div>

<div id="chat-screen" class="chat-screen hidden">
  <header class="chat-header">
    <div class="header-left">
      <div id="status-dot" class="status-dot connecting"></div>
      <span id="channel-name" class="channel-name"></span>
    </div>
    <div class="header-center">
      <span id="msg-count" class="msg-count">0 メッセージ</span>
    </div>
    <div class="header-right">
      <div class="header-langs">
        <select id="header-src-lang">
          <option value="auto">自動</option>
          <option value="en">英語</option>
          <option value="ko">韓国語</option>
          <option value="zh-CN">中国語簡体字</option>
          <option value="zh-TW">中国語繁体字</option>
          <option value="es">スペイン語</option>
          <option value="fr">フランス語</option>
          <option value="de">ドイツ語</option>
          <option value="pt">ポルトガル語</option>
          <option value="ru">ロシア語</option>
          <option value="ja">日本語</option>
          <option value="ar">アラビア語</option>
          <option value="hi">ヒンディー語</option>
          <option value="th">タイ語</option>
          <option value="vi">ベトナム語</option>
        </select>
        <span class="header-lang-arrow">→</span>
        <select id="header-tgt-lang">
          <option value="ja">日本語</option>
          <option value="en">英語</option>
          <option value="ko">韓国語</option>
          <option value="zh-CN">中国語簡体字</option>
          <option value="zh-TW">中国語繁体字</option>
          <option value="es">スペイン語</option>
          <option value="fr">フランス語</option>
          <option value="de">ドイツ語</option>
          <option value="pt">ポルトガル語</option>
          <option value="ru">ロシア語</option>
          <option value="ar">アラビア語</option>
          <option value="hi">ヒンディー語</option>
          <option value="th">タイ語</option>
          <option value="vi">ベトナム語</option>
        </select>
      </div>
      <label class="toggle-label">
        <input type="checkbox" id="show-original" checked>
        <span>原文表示</span>
      </label>
      <label class="toggle-label">
        <input type="checkbox" id="auto-scroll" checked>
        <span>自動スクロール</span>
      </label>
      <label class="toggle-label experimental-label">
        <input type="checkbox" id="experimental-toggle">
        <span>送信 <span class="exp-badge">実験的</span></span>
      </label>
      <button id="disconnect-btn" class="disconnect-btn">切断</button>
    </div>
  </header>

  <div id="chat-container" class="chat-container">
    <div id="chat-messages" class="chat-messages"></div>
  </div>

  <div id="translate-queue-info" class="queue-info hidden">翻訳中...</div>

  <div id="chat-input-area" class="chat-input-area hidden">
    <div id="auth-panel" class="auth-panel">
      <span class="auth-hint">送信にはTwitch OAuthトークンが必要です</span>
      <input type="text" id="twitch-username" placeholder="ユーザー名" autocomplete="off" spellcheck="false">
      <input type="password" id="twitch-token" placeholder="oauth:xxxxxxxx">
      <a href="https://twitchapps.com/tmi/" target="_blank" class="token-link">トークン取得</a>
      <button id="auth-btn" class="auth-btn">認証</button>
    </div>
    <div id="send-panel" class="send-panel hidden">
      <span class="send-user"></span>
      <input type="text" id="message-input" placeholder="メッセージを入力（チャット言語に翻訳して送信）" autocomplete="off">
      <button id="send-btn" class="send-btn">送信</button>
    </div>
  </div>
</div>

<script src="main.js"></script>
</body>
</html>
